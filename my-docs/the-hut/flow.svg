<svg viewBox="0 0 960 430" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>The doppl flow: one spine, discovery as a side process</title>
  <desc>case_study to problem_recovery to doppl, then a dotted pointer out into the solution space. problem_recovery and doppl each call discovery and get control back; discovery reads the web and reads and writes the stock field. The case study does not call discovery.</desc>
  <defs>
    <marker id="sp" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5fb0c4"/>
    </marker>
    <marker id="sd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="430" fill="#23262b"/>

  <!-- SPINE (the flow) -->
  <rect x="24" y="57" width="120" height="46" rx="23" fill="#2b2f36" stroke="#5fb0c4" stroke-width="1.6"/>
  <text x="84" y="84" text-anchor="middle" font-size="15" fill="#ececec">case_study</text>
  <rect x="176" y="57" width="156" height="46" rx="23" fill="#2b2f36" stroke="#5fb0c4" stroke-width="1.6"/>
  <text x="254" y="84" text-anchor="middle" font-size="15" fill="#ececec">problem_recovery</text>
  <rect x="364" y="57" width="96" height="46" rx="23" fill="#2b2f36" stroke="#5fb0c4" stroke-width="1.6"/>
  <text x="412" y="84" text-anchor="middle" font-size="15" fill="#ececec">doppl</text>
  <rect x="540" y="50" width="312" height="60" rx="16" fill="none" stroke="#9aa0a6" stroke-width="1.4" stroke-dasharray="3 5"/>
  <text x="696" y="76" text-anchor="middle" font-size="14" fill="#ececec">human action</text>
  <text x="696" y="95" text-anchor="middle" font-size="12" fill="#9aa0a6">the open solution space</text>

  <line x1="144" y1="80" x2="170" y2="80" stroke="#5fb0c4" stroke-width="2.4" marker-end="url(#sp)"/>
  <line x1="332" y1="80" x2="358" y2="80" stroke="#5fb0c4" stroke-width="2.4" marker-end="url(#sp)"/>
  <line x1="460" y1="80" x2="532" y2="80" stroke="#5fb0c4" stroke-width="2.4" stroke-dasharray="2 5" marker-end="url(#sp)"/>
  <text x="496" y="66" text-anchor="middle" font-size="10.5" fill="#9aa0a6">out into the world</text>

  <!-- DISCOVERY (side process, below the line) -->
  <rect x="232" y="214" width="136" height="50" rx="10" fill="#24272d" stroke="#9aa0a6" stroke-width="1.3" stroke-dasharray="4 4"/>
  <text x="300" y="235" text-anchor="middle" font-size="14" fill="#ececec">discovery</text>
  <text x="300" y="251" text-anchor="middle" font-size="10.5" fill="#9aa0a6">tool · round trip</text>

  <g fill="#24272d" stroke="#9aa0a6" stroke-width="1.2">
    <path d="M144,358 L144,386"/><path d="M236,358 L236,386"/>
    <path d="M144,386 A46,8 0 0 0 236,386" fill="none"/>
    <rect x="144" y="358" width="92" height="28" stroke="none"/>
    <ellipse cx="190" cy="358" rx="46" ry="8"/>
  </g>
  <text x="190" y="376" text-anchor="middle" font-size="13" fill="#ececec">web</text>

  <g fill="#24272d" stroke="#9aa0a6" stroke-width="1.2">
    <path d="M380,358 L380,386"/><path d="M500,358 L500,386"/>
    <path d="M380,386 A60,8 0 0 0 500,386" fill="none"/>
    <rect x="380" y="358" width="120" height="28" stroke="none"/>
    <ellipse cx="440" cy="358" rx="60" ry="8"/>
  </g>
  <text x="440" y="376" text-anchor="middle" font-size="13" fill="#ececec">stock field</text>

  <!-- side links (dashed = back-and-forth, double-headed) -->
  <line x1="256" y1="104" x2="290" y2="212" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5 4" marker-start="url(#sd)" marker-end="url(#sd)"/>
  <line x1="410" y1="104" x2="342" y2="212" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5 4" marker-start="url(#sd)" marker-end="url(#sd)"/>
  <line x1="266" y1="266" x2="206" y2="352" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5 4" marker-start="url(#sd)" marker-end="url(#sd)"/>
  <line x1="338" y1="266" x2="428" y2="352" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5 4" marker-start="url(#sd)" marker-end="url(#sd)"/>

  <g font-size="10.5" fill="#9aa0a6" text-anchor="middle">
    <text x="232" y="160">call / return</text>
    <text x="394" y="160">call / return</text>
    <text x="206" y="316">read</text>
    <text x="406" y="316">read / write</text>
  </g>

  <g font-size="11" fill="#9aa0a6">
    <line x1="600" y1="250" x2="628" y2="250" stroke="#5fb0c4" stroke-width="2.4"/>
    <text x="634" y="254">the flow (spine) = the kernel</text>
    <line x1="600" y1="272" x2="628" y2="272" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="634" y="276">back-and-forth side process</text>
  </g>
</svg>
