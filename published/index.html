<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doppl Published Preview</title>
    <style>
      :root {
        color: #172033;
        background: #eef2f5;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 880px;
        padding: 56px 28px;
      }

      .eyebrow {
        color: #0f766e;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
        margin: 0 0 8px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(42px, 7vw, 76px);
        line-height: 0.98;
        margin: 0 0 22px;
      }

      p {
        color: #405066;
        font-size: 18px;
        line-height: 1.55;
        max-width: 680px;
      }

      a {
        align-items: center;
        background: #132234;
        border-radius: 4px;
        color: #fff;
        display: inline-flex;
        font-weight: 900;
        margin-top: 18px;
        min-height: 48px;
        padding: 0 18px;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid #0f766e;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Doppl Life</p>
      <h1>Published Preview</h1>
      <p>
        Read-only static previews for Doppl Prime artifacts. The calibrator preview can browse the
        vault-derived case and solution artifacts; live rating writes require the local dev API or a
        future hosted backend.
      </p>
      <a href="./calibrator/">Open Calibrator</a>
    </main>
  </body>
</html>
