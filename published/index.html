<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doppl Published Previews</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #5d6880;
      --line: #d9e1ee;
      --paper: #f7f9fc;
      --panel: #ffffff;
      --blue: #2357d6;
      --blue-soft: #eaf0ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--paper);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(960px, calc(100% - 40px));
      margin: 0 auto;
      padding: 56px 0;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1;
      letter-spacing: 0;
    }
    p { color: var(--muted); max-width: 700px; }
    a {
      display: block;
      margin-top: 28px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--panel);
      text-decoration: none;
    }
    a:hover,
    a:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--blue-soft);
    }
    strong { display: block; font-size: 22px; }
    code {
      display: inline-block;
      margin-top: 6px;
      color: var(--blue);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Doppl Published Previews</h1>
    <p>Static, secret-free previews generated from deterministic kernel artifacts.</p>
    <a href="kernel/">
      <strong>Doppl Kernel Proof Board</strong>
      <code>run_fsd_ownership_fixture</code>
    </a>
  </main>
</body>
</html>
