name: Request Published Preview Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - calibration
    paths:
      - "published/**"
      - ".github/workflows/deploy-published-preview.yml"

permissions:
  actions: write
  contents: read

jobs:
  request-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch canonical Pages composer
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh workflow run deploy-published-preview.yml
          --repo Doppl-Life/doppl-prime
          --ref dalton-outer-view
