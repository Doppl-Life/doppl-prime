name: Deploy Published Preview

on:
  workflow_dispatch:
  push:
    branches:
      - calibration
    paths:
      - "published/**"
      - ".github/workflows/deploy-published-preview.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload published preview
        uses: actions/upload-pages-artifact@v3
        with:
          path: published

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
