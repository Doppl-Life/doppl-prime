<body>
<div id="root"></div>
<script type="text/babel">
  const { StatusBadge, Button, Meter } = window.DopplDesignSystem_352b49;

      <div>
        <div className="block">
          <p className="sec">StatusBadge · agenome / candidate / check / subtype</p>

            <StatusBadge domain="agenome" status="active" />

        <div className="block">
