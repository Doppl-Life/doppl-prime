<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />

  .r { display: flex; align-items: baseline; gap: 16px; margin-bottom: 12px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); width: 116px; flex: none; }
  .display { font-size: var(--text-display); line-height: var(--text-display-lh); font-weight: 700; }
  .h1 { font-size: var(--text-h1); line-height: var(--text-h1-lh); font-weight: 700; }
  .h2 { font-size: var(--text-h2); line-height: var(--text-h2-lh); font-weight: 600; }
  .h3 { font-size: var(--text-h3); line-height: var(--text-h3-lh); font-weight: 600; }
</style>
</head>
<body>
  <div class="r"><span class="tag">display · 40/700</span><span class="display">Cold-chain routing</span></div>
  <div class="r"><span class="tag">h1 · 30/700</span><span class="h1">Cross-domain: epidemiology → logistics</span></div>
  <div class="r"><span class="tag">h2 · 24/600</span><span class="h2">Fitness over time</span></div>
