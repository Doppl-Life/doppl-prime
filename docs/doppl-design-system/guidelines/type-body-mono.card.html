<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 20px 24px; color: var(--fg-default); }
  .r { display: flex; align-items: baseline; gap: 16px; margin-bottom: 11px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); width: 120px; flex: none; }
  .ui { font-family: var(--font-ui); }
  .mono { font-family: var(--font-mono); color: var(--fg-muted); }
  .body-lg { font-size: var(--text-body-lg); }
  .body { font-size: var(--text-body); }
  .label { font-size: var(--text-label); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; color: var(--fg-muted); }
  .mlg { font-size: var(--text-mono-lg); color: var(--fg-default); }
  .m { font-size: var(--text-mono); }
</style>
</head>
<body>
  <div class="r"><span class="tag">body-lg · 17</span><span class="ui body-lg">Treat vaccine demand like an infection curve.</span></div>
  <div class="r"><span class="tag">body · 15</span><span class="ui body">Pre-position cold-chain stock ahead of the forecasted surge.</span></div>
  <div class="r"><span class="tag">label · 14</span><span class="ui label">eligible_parent</span></div>
  <div class="r"><span class="tag">mono-lg · 16</span><span class="mono mlg">⚡ 6,420 / 12,000</span></div>
  <div class="r"><span class="tag">mono · 14</span><span class="mono m">run_7f3a · cand_g3_004 · seq 1187 · fitness 0.84</span></div>
</body>
</html>
