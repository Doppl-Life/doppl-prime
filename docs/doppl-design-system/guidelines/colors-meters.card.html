<!-- @dsCard group="Colors" viewport="700x220" name="Meters — length is truth" subtitle="Fitness/novelty/energy are filled meters with numbers, never hue alone; color only grades the fill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-surface); padding: 20px 22px; font-family: var(--font-ui); }
  .m { display: grid; grid-template-columns: 130px 1fr 52px; align-items: center; gap: 14px; margin-bottom: 12px; }
  .k { font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted); }
  .track { height: 10px; border-radius: var(--radius-full); background: var(--meter-track); overflow: hidden; }
  .fill { height: 100%; border-radius: var(--radius-full); }
  .v { font-family: var(--font-mono); font-size: 13px; color: var(--fg-default); text-align: right; }
</style>
</head>
<body>
  <div class="m"><span class="k">fitness · high</span><span class="track"><span class="fill" style="width:84%;background:var(--fitness-high)"></span></span><span class="v">0.84</span></div>
  <div class="m"><span class="k">fitness · mid</span><span class="track"><span class="fill" style="width:58%;background:var(--fitness-mid)"></span></span><span class="v">0.58</span></div>
  <div class="m"><span class="k">fitness · low</span><span class="track"><span class="fill" style="width:22%;background:var(--fitness-low)"></span></span><span class="v">0.22</span></div>
  <div class="m"><span class="k">novelty</span><span class="track"><span class="fill" style="width:74%;background:var(--novelty-fill)"></span></span><span class="v">0.74</span></div>
  <div class="m"><span class="k">energy</span><span class="track"><span class="fill" style="width:46%;background:var(--energy-full);box-shadow:var(--glow-energy)"></span></span><span class="v">46%</span></div>
</body>
</html>
