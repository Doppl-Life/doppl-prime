<!-- @dsCard group="Status" viewport="700x260" name="Candidate & check status" subtitle="created→under_review→checked→scored→selected; checks passed/failed/skipped(+reason)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 18px 22px; font-family: var(--font-ui); }
  .sec { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-faint); margin: 0 0 9px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px 28px; margin-bottom: 16px; }
  .badge { display: flex; align-items: center; gap: 10px; }
  .glyph { font-size: 19px; width: 24px; text-align: center; }
  .label { font-family: var(--font-mono); font-size: 12px; font-weight: 600; text-transform: uppercase; }
  .row { display: flex; gap: 22px; align-items: center; }
</style>
</head>
<body>
  <p class="sec">Candidate</p>
  <div class="grid">
    <div class="badge"><span class="glyph" style="color:var(--status-created)">·</span><span class="label" style="color:var(--status-created)">created</span></div>
    <div class="badge"><span class="glyph" style="color:var(--status-review)">◐</span><span class="label" style="color:var(--status-review)">under_review</span></div>
    <div class="badge"><span class="glyph" style="color:var(--status-checked)">◑</span><span class="label" style="color:var(--status-checked)">checked</span></div>
    <div class="badge"><span class="glyph" style="color:var(--status-scored)">◉</span><span class="label" style="color:var(--status-scored)">scored</span></div>
    <div class="badge"><span class="glyph" style="color:var(--status-selected);text-shadow:var(--glow-winner)">♔</span><span class="label" style="color:var(--status-selected)">selected</span></div>
    <div class="badge"><span class="glyph" style="color:var(--status-invalid)">△</span><span class="label" style="color:var(--status-invalid)">invalid</span></div>
  </div>
  <p class="sec">Check</p>
  <div class="row">
    <div class="badge"><span class="glyph" style="color:var(--check-passed)">✓</span><span class="label" style="color:var(--check-passed)">passed</span></div>
    <div class="badge"><span class="glyph" style="color:var(--check-failed)">✕</span><span class="label" style="color:var(--check-failed)">failed</span></div>
    <div class="badge"><span class="glyph" style="color:var(--check-skipped)">–</span><span class="label" style="color:var(--check-skipped)">skipped</span><span style="color:var(--fg-faint);font-size:12px">+ reason</span></div>
  </div>
</body>
</html>
