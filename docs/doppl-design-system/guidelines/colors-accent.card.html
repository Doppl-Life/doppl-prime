<!-- @dsCard group="Colors" viewport="700x150" name="Accent + semantic feedback" subtitle="Living cyan for interactive/alive; info/success/warning/danger for system chrome" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 20px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 100px; }
  .chip { height: 50px; border-radius: var(--radius-md); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-top: 7px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent);box-shadow:var(--glow-active)"></div><div class="name">accent</div><div class="hex">#3BE3D0</div></div>
    <div class="sw"><div class="chip" style="background:var(--info)"></div><div class="name">info</div><div class="hex">#5AA9FF</div></div>
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="name">success</div><div class="hex">#3FD17A</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="name">warning</div><div class="hex">#F4B650</div></div>
    <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="name">danger</div><div class="hex">#F2545B</div></div>
  </div>
</body>
</html>
