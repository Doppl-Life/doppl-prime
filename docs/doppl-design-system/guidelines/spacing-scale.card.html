<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px base grid with a 4px half-step for dense mono rows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .u { text-align: center; }
  .bar { background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 3px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="bar" style="width:4px;height:4px"></div><div class="n">1·4</div></div>
    <div class="u"><div class="bar" style="width:8px;height:8px"></div><div class="n">2·8</div></div>
    <div class="u"><div class="bar" style="width:12px;height:12px"></div><div class="n">3·12</div></div>
    <div class="u"><div class="bar" style="width:16px;height:16px"></div><div class="n">4·16</div></div>
    <div class="u"><div class="bar" style="width:24px;height:24px"></div><div class="n">5·24</div></div>
    <div class="u"><div class="bar" style="width:32px;height:32px"></div><div class="n">6·32</div></div>
    <div class="u"><div class="bar" style="width:48px;height:48px"></div><div class="n">7·48</div></div>
    <div class="u"><div class="bar" style="width:64px;height:64px"></div><div class="n">8·64</div></div>
  </div>
</body>
</html>
